aid: hub-group
name: HUB Group
description: >-
  HUB is a global leader in multifunction pole design and street infrastructure,
  supplying over 1,000 pieces of urban infrastructure worldwide. With 20+ years
  of experience, HUB excels in integrating digital devices and data analytics
  into innovative urban solutions. Partnered with Valmont Industries, HUB delivers
  high-quality infrastructure for public spaces, including telecommunications
  poles, monopoles, steel jackets, and head frames.
